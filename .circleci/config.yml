version: 2.1
# This config intentionally does nothing. It exists only to prevent CircleCI from
# failing with a 'No Configuration' error on this branch. The filter references a
# branch that is never run, ensuring this job does not execute.
jobs:
  noop:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "No operation."

workflows:
  noop-workflow:
    jobs:
      - noop:
          filters:
            branches:
              only:
                - never-run-this-branch